spring:
  application:
    name: fx-wallet
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:fxwallet;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  h2:
    console:
      enabled: true
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
app:
  jwt-secret: ${JWT_SECRET:change-me-change-me-change-me-change-me-32}
  frontend-url: ${FRONTEND_URL:http://127.0.0.1:5173/}
  cors-allowed-origins: ${CORS_ALLOWED_ORIGINS:http://127.0.0.1:5173,http://localhost:5173}
  seed-demo-users: ${SEED_DEMO_USERS:true}
  jwt-minutes: 15
  refresh-days: 7
  platform-fee-percent: 0.005
  transfer-flat-fee: 25.00
  transfer-percent-fee: 0.003
  fraud-high-value-usd: 5000.00
springdoc:
  swagger-ui:
    path: /swagger-ui.html
